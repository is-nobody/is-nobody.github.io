<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex - About</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="components/common.css">
</head>
<body class="flex flex-col min-h-screen">
    <main class="flex-grow container mx-auto px-4 py-12 max-w-3xl">
        <div class="text-center mb-12">
            <div class="inline-block p-4 rounded-full dark:bg-[#1a1a1a] light:bg-gray-100 mb-6">
                <svg class="w-16 h-16 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-bold hero-title mb-4">About Apex</h1>
            <p class="text-lg hero-text max-w-2xl mx-auto">
                Powerful doesn't have to mean complicated.
            </p>
        </div>

        <div class="space-y-8">
            <div class="doc-card rounded-xl p-6">
                <h2 class="text-xl font-bold dark:text-white light:text-gray-900 mb-3">The Creator</h2>
                <blockquote class="text-lg dark:text-gray-300 light:text-gray-600 italic border-l-4 border-green-500 pl-4 py-2">
                    "I'm nobody. My goal is to prove that the quietest voice can still start the loudest revolution."
                </blockquote>
            </div>
        </div>
    </main>

    <script src="components/load-navbar.js"></script>
</body>
</html>
