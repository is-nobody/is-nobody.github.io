<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Language</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="components/common.css">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/editor/editor.main.min.css" />
</head>
<body class="flex flex-col min-h-screen">
    <!-- Hero Section -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-5xl">
        <div class="flex flex-col md:flex-row items-center justify-between gap-12 mb-16">
            <div class="md:w-1/2">
                <h1 class="text-6xl font-bold hero-title mb-6">Apex</h1>
                <p class="text-lg hero-text mb-8 leading-relaxed max-w-lg">
                    Apex is a simple, powerful, and high-performance programming language with clean, indentation-based syntax and a rich standard library.
                </p>
                <div class="flex flex-wrap items-center gap-4">
                    <a href="learn.html" class="btn-primary px-6 py-2 rounded-full font-medium inline-block">Start Learn</a>
                    <button class="btn-outline px-6 py-2 rounded-full font-medium bg-transparent">News</button>
                </div>
            </div>
            <div class="md:w-1/2 flex justify-center md:justify-end">
                <div class="w-64 h-64 flex items-center justify-center">
                    <img src="resources/logo-dark.png" 
                         alt="Apex Logo Light Theme" 
                         class="logo-dark-img w-full h-full object-contain drop-shadow-xl"
                         style="display: none;"
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-64 h-64 bg-gray-200 rounded-full flex items-center justify-center text-gray-500\'>Logo not found</div>'">
                    <img src="resources/logo.png" 
                         alt="Apex Logo Dark Theme" 
                         class="logo-light-img w-full h-full object-contain drop-shadow-xl"
                         style="display: block;"
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-64 h-64 bg-[#1e1e1e] rounded-full flex items-center justify-center text-gray-500\'>Logo not found</div>'">
                </div>
            </div>
        </div>

        <!-- IDE Section -->
        <h2 class="text-3xl font-bold section-title mb-6">Try Apex!</h2>
        <div class="ide-container rounded-lg overflow-hidden shadow-2xl">
            <!-- Tabs & Toolbar -->
            <div class="flex items-center justify-between tabs-toolbar px-2 py-1">
                <div class="flex items-center gap-1 text-sm">
                    <div class="px-3 py-1 cursor-pointer active-tab tab-text" onclick="switchFile('for.apex')">for.apex</div>
                    <div class="px-3 py-1 cursor-pointer tab-text" onclick="switchFile('calculator.apex')">calculator.apex</div>
                    <div class="px-3 py-1 cursor-pointer tab-text" onclick="switchFile('fib.apex')">fib.apex</div>
                    <div class="px-3 py-1 cursor-pointer tab-text" onclick="switchFile('tree.apex')">tree.apex</div>
                </div>
                <div class="toolbar-actions">
                    <button onclick="executeCode()" class="btn-primary text-xs px-3 py-1 rounded flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Run
                    </button>
                    <button class="text-xs toolbar-text bg-transparent px-2 py-1 rounded">Open</button>
                </div>
            </div>

            <!-- Monaco Editor -->
            <div id="editor-container" class="editor-container"></div>

            <!-- Output / Terminal -->
            <div class="terminal p-4">
                <div class="border-t border-gray-600 pt-2"></div>
                <div id="output-box" class="output-box whitespace-pre-wrap font-mono text-sm leading-relaxed"></div>
                <div id="input-prompt" style="display: none; padding: 8px 0; border-top: 1px solid #333; align-items: center; gap: 8px;">
                    <span style="color: #4ade80; font-family: monospace;">></span>
                    <input id="input-field" type="text" 
                        style="background: transparent; border: none; color: #e5e7eb; 
                                font-family: monospace; font-size: 14px; width: 90%; outline: none;"
                        onkeydown="if(event.key === 'Enter') submitInput()">
                </div>
            </div>
        </div>
    </main>

    <!-- Monaco Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
    <script src="components/load-navbar.js"></script>
    <script src="apex-language.js"></script>
    <script src="execute_apex.js"></script>

    <script>
        const files = {
            'for.apex': `import os\nimport sys\n\nfunction for_counter_100m()\n    start = sys.time()\n    x = 0\n    for i = 1, 100000000\n        x = x + i\n    elapsed = sys.time() - start\n    os.output("100000000 iterations for counter: {x}, elapsed {elapsed}")\n\nfunction for_condition_100m()\n    start = sys.time()\n    x = 0\n    i = 1\n    for i < 100000001\n        x = x + i\n        i = i + 1\n    elapsed = sys.time() - start\n    os.output("100000000 iterations for condition: {x}, elapsed {elapsed}")\n\nfor_counter_100m()\nfor_condition_100m()`,
            'calculator.apex': `import os\n\na = number(os.input("Enter first number: "))\nb = number(os.input("Enter second number: "))\no = os.input("Operation (+, -, *, /, %): ")\n\nif a == none or o == none or b == none\n    os.output("Invalid input!")\n    os.exit(1)\n\nif o == "+"\n    result = a + b\nelif o == "-"\n    result = a - b\nelif o == "*"\n    result = a * b\nelif o == "/"\n    if b == 0\n        os.output("Error: division by zero!")\n        os.exit(1)\n    result = a / b\nelif o == "%"\n    result = a % b\nelse\n    os.output("Unknown operation!")\n    os.exit(1)\n\nos.output("{a} {o} {b} = {result}")`,
            'fib.apex': `import os\nimport sys\n\nfunction fib(n)\n    if n < 2\n        return n\n    return fib(n - 1) + fib(n - 2)\n\nstart = sys.time()\nresult = fib(35)\nelapsed = sys.time() - start\nos.output("fib(35) recursive = {result}, elapsed {elapsed}")`,
            'tree.apex': `import os\nimport sys\n\nfunction tree(n)\n    if n == 0\n        return 0\n    return 1 + tree(n - 1) + tree(n - 1)\n\nstart = sys.time()\nresult = tree(25)\nelapsed = sys.time() - start\nos.output("tree(25) = {result}, elapsed {elapsed}")`
        };

        const executor = new ApexExecutor();

        executor.onOutput = function(text) {
            const outputBox = document.getElementById('output-box');
            outputBox.innerHTML += text;
            outputBox.scrollTop = outputBox.scrollHeight;
        };

        executor.onInput = function() {
            const inputPrompt = document.getElementById('input-prompt');
            inputPrompt.style.display = 'flex';
            const inputField = document.getElementById('input-field');
            inputField.value = '';
            inputField.focus();
        };

        window.submitInput = function() {
            const inputField = document.getElementById('input-field');
            const value = inputField.value;
            inputField.value = '';
            document.getElementById('input-prompt').style.display = 'none';
            executor.submitInput(value);
        };

        executor.init('apex.wasm').then(() => {
            document.getElementById('output-box').innerHTML = 'WASM ready\n';
        }).catch(err => {
            document.getElementById('output-box').innerHTML = 'Failed to load WASM: ' + err.message + '\n';
        });

        let editor;
        let currentFile = 'for.apex';

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            registerApexLanguage();
            
            const initialTheme = 'apex-dark';
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: files[currentFile],
                language: 'apex',
                theme: initialTheme,
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                scrollbar: { vertical: 'visible', horizontal: 'visible' }
            });
            window.editor = editor;
        });

        function switchFile(filename) {
            if(!files[filename]) {
                files[filename] = `# New file: ${filename}`;
            }
            if(editor) {
                files[currentFile] = editor.getValue();
                currentFile = filename;
                editor.setValue(files[currentFile]);
                document.querySelectorAll('.active-tab').forEach(el => el.classList.remove('active-tab'));
                const tabs = document.querySelectorAll('[onclick*="switchFile"]');
                tabs.forEach(tab => {
                    if(tab.innerText.trim() === filename) {
                        tab.classList.add('active-tab');
                    }
                });
            }
        }

        function executeCode() {
            const outputBox = document.getElementById('output-box');
            outputBox.innerHTML = '';
            
            if(editor) files[currentFile] = editor.getValue();
            
            const code = files[currentFile];
            
            if (!executor.isReady()) {
                outputBox.innerHTML = 'Loading WASM...\n';
                executor.init('apex.wasm').then(() => {
                    runApexCode(code);
                }).catch(err => {
                    outputBox.innerHTML = 'Failed to load WASM: ' + err.message + '\n';
                });
            } else {
                runApexCode(code);
            }
        }

        function runApexCode(code) {
            const outputBox = document.getElementById('output-box');
            outputBox.innerHTML = '';
            
            executor.onOutput = function(text) {
                outputBox.innerHTML += text;
                outputBox.scrollTop = outputBox.scrollHeight;
            };
            
            executor.execute(code).then(result => {
                if (result.error) {
                    outputBox.innerHTML += '\x1b[31mError: ' + result.error + '\x1b[0m\n';
                }
                if (!result.output && !result.error) {
                    outputBox.innerHTML += 'Execution completed\n';
                }
            }).catch(err => {
                outputBox.innerHTML += '\x1b[31mError: ' + err.message + '\x1b[0m\n';
            });
        }
    </script>
</body>
</html>
